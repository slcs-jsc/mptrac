<!DOCTYPE html>
<html>
  <head>
    <title>MPTRAC Web Runner</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        border: none;
        border-radius: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .btn-primary {
        background: #0d4f8b;
        color: white;
      }

      .btn-primary:hover {
        background: #1666ad;
        color: white;
      }

      .btn-secondary {
        background: #2b3440;
        color: #f4f7fb;
      }

      .btn-secondary:hover {
        background: #3a4654;
        color: white;
      }

      .btn-large {
        padding: 14px 24px;
        font-size: 18px;
        border-radius: 18px;
      }

      .btn-medium {
        padding: 11px 18px;
        font-size: 16px;
      }

      .btn-small {
        padding: 9px 14px;
        font-size: 15px;
        border-radius: 12px;
      }

      .btn-block {
        display: flex;
        width: 100%;
        text-align: left;
      }

      .btn-footer {
        padding: 7px 12px;
        font-size: 14px;
        border-radius: 10px;
      }

      .page-width {
        width: min(1180px, 88vw);
        margin: 0 auto;
      }

      .hero-panel {
        background: linear-gradient(120deg, #041a34, #0a3f73);
        color: white;
        border: 1px solid rgba(160, 205, 255, 0.18);
        border-radius: 24px;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      .subhero-panel {
        background: linear-gradient(180deg, rgba(24, 31, 41, 0.96), rgba(17, 23, 31, 0.96));
        color: white;
        border: 1px solid rgba(101, 129, 163, 0.28);
        border-radius: 22px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.26);
      }

      .surface-panel {
        background: linear-gradient(180deg, rgba(26, 32, 42, 0.98), rgba(21, 27, 36, 0.98));
        border: 1px solid rgba(91, 111, 136, 0.26);
        border-radius: 20px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      }

      .footer-links {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .log-box {
        width: 100%;
        background: #161b22;
        padding: 18px;
        max-height: 500px;
        overflow: auto;
        box-sizing: border-box;
        border: 1px solid rgba(96, 119, 150, 0.25);
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.45;
      }

      .plot-frame {
        width: 100%;
        max-height: 85vh;
        background: #161b22;
        padding: 15px;
        box-sizing: border-box;
        object-fit: contain;
        border: 1px solid rgba(96, 119, 150, 0.25);
      }

      .section-card {
        background: linear-gradient(180deg, rgba(26, 32, 42, 0.98), rgba(21, 27, 36, 0.98));
        color: white;
        padding: 18px;
        margin-bottom: 14px;
        border: 1px solid rgba(91, 111, 136, 0.26);
        border-radius: 18px;
      }

    </style>
  </head>
  
  <body style="font-family:'Segoe UI', Arial, Helvetica, sans-serif; font-size:18px; line-height:1.55; background: radial-gradient(circle at top, #16263b 0%, #10151d 42%, #0b0f15 100%); color:#d7e0eb; padding:20px;">

    <!-- Header -->
    <div class="w3-container w3-padding-24 page-width hero-panel">
      <div class="w3-row w3-center w3-padding-16 w3-content" style="max-width:1200px; margin:auto; display: flex; align-items: center; justify-content: center;">  
	<div style="display: flex; align-items: center;">
	  <img src="{{ url_for('static', filename='images/MPTRAC.svg') }}" alt="Logo" style="height:100px; margin-right:20px;">
	  <div style="text-align: left;">
            <h1 style="margin:0; font-size:32px;">Massive-Parallel Trajectory Calculations</h1>
            <h4 style="margin-top:6px; font-size:18px; color: #ddd;">Web Runner for Air Parcel Trajectory Calculations</h4>
	  </div>
	</div>
      </div>
    </div>

    <div class="w3-container w3-padding-16 w3-center page-width subhero-panel" style="margin-top: 14px;">
      <div class="w3-row w3-content" style="max-width:1200px; margin:auto;">
	<h2 class="w3-text-red w3-center">❌ Simulation Failed</h2>
      </div>
    </div>
    
    <br>
    
    <!-- Common wrapper to unify width -->
    <div class="page-width" style="box-sizing: border-box;">
      
      <h3 class="w3-center">Log Output</h3>
      <p style="color: #ccc; margin-bottom: 10px; text-align: center;">
	Review the model output below to identify the error and any related warnings.
      </p>
      <pre class="log-box">
	{{ stdout }}
      </pre>
    </div>
    
    <br>
    
    <div class="w3-bar w3-center">
      <button onclick="window.history.back()"
	      class="btn btn-primary btn-large"
	      style="margin-right: 20px;">
	🔁 Modify Simulation
      </button>
      
      <button onclick="window.location.href='/'"
	      class="btn btn-primary btn-large">
	🏠 Return to Homepage
      </button>
    </div>

    <!-- Footer -->
    <footer class="w3-container w3-center w3-padding-32 page-width subhero-panel" style="margin-top:40px;">
      <div class="footer-links">
	<a href="/terms" class="btn btn-primary btn-footer">Terms & Conditions</a>
	<a href="https://www.fz-juelich.de/en/legal-notice" class="btn btn-primary btn-footer">Legal Notice</a>
	<a href="https://www.fz-juelich.de/en/privacy-policy" class="btn btn-primary btn-footer">Privacy Policy</a>
      </div>
    </footer>
    
  </body>
</html>
